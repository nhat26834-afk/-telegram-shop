<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Huy Bảo Shop - Cyber Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* --- BỘ MÀU TÍM HỒNG NEON CHUẨN ANIME GAME --- */
        :root {
            --bg-main: #0a0413;
            --bg-card: linear-gradient(135deg, #17072b 0%, #250a47 100%);
            --bg-input: #1f0b3b;
            --text-color: #ffffff;
            --neon-green: #00ffaa;
            --cyan-blue: #ff2a85; /* Chuyển đổi sang màu hồng neon quyến rũ */
            --premium-purple: #b546ff;
            --gold-amber: #ffcc00;
            --gray-text: #c0a8da;
            --danger-red: #ff4d6d;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            padding-bottom: 90px;
            user-select: none;
        }

        /* HEADER UI & ACCOUNT ID DISPLAY */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: linear-gradient(180deg, #18072c 0%, #0a0413 100%);
            border-bottom: 2px solid #2e1054;
        }

        .user-block {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar-box {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            border: 2px solid var(--cyan-blue);
            box-shadow: 0 0 12px rgba(255, 42, 133, 0.5);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #1f0b3b;
            font-weight: bold;
        }

        .avatar-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .user-meta {
            display: flex;
            flex-direction: column;
        }

        .user-name {
            font-weight: bold;
            font-size: 14px;
            color: #fff;
        }

        .user-account-id {
            font-size: 11px;
            color: var(--cyan-blue);
            font-weight: bold;
            margin-top: 1px;
            letter-spacing: 0.5px;
        }

        .balance-badge {
            font-size: 12px;
            color: var(--gold-amber);
            font-weight: 800;
            margin-top: 3px;
            background: rgba(255, 204, 0, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid rgba(255, 204, 0, 0.3);
            width: fit-content;
        }

        .top-controls {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 6px;
        }

        .lang-switch-btn {
            background: #1f0b3b;
            border: 1px solid var(--cyan-blue);
            color: var(--cyan-blue);
            padding: 4px 10px;
            font-size: 11px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 0 8px rgba(255, 42, 133, 0.2);
        }

        .admin-glow-btn {
            background: linear-gradient(90deg, var(--neon-green), var(--cyan-blue));
            color: #000;
            border: none;
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 12px rgba(0, 255, 170, 0.4);
        }

        /* ADMIN PANEL BY ID */
        .admin-container {
            display: none;
            margin: 15px;
            padding: 15px;
            border: 2px dashed var(--neon-green);
            border-radius: 12px;
            background-color: #120522;
        }

        .admin-title {
            color: var(--neon-green);
            font-size: 13px;
            font-weight: bold;
            margin: 0 0 12px 0;
            text-transform: uppercase;
        }

        .input-field {
            width: 100%;
            background-color: var(--bg-input);
            border: 1px solid #361563;
            color: white;
            padding: 11px;
            border-radius: 8px;
            font-size: 13px;
            box-sizing: border-box;
            margin-bottom: 10px;
            outline: none;
        }

        .input-field:focus {
            border-color: var(--cyan-blue);
        }

        .btn-update-config {
            width: 100%;
            background: linear-gradient(90deg, var(--cyan-blue), var(--premium-purple));
            color: white;
            border: none;
            padding: 11px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 12px;
            box-shadow: 0 4px 12px rgba(255, 42, 133, 0.3);
        }

        /* STOREFRONT STYLING */
        .cate-title {
            padding: 15px 15px 5px 15px;
            font-size: 13px;
            font-weight: 800;
            color: var(--cyan-blue);
            display: flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
            text-shadow: 0 0 6px rgba(255, 42, 133, 0.3);
        }

        .tab-content {
            display: none;
            padding: 15px;
        }

        .tab-content.active {
            display: block;
        }

        .product-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .product-item {
            background: var(--bg-card);
            border: 1px solid #31135c;
            border-radius: 12px;
            padding: 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        .product-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        /* LOGO STYLING MATCHING USER ASSETS */
        .product-icon-wrapper {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            background: rgba(10, 4, 19, 0.7);
            border: 1.5px solid rgba(255, 42, 133, 0.3);
            box-shadow: inset 0 0 8px rgba(255,42,133,0.1);
            position: relative;
        }

        /* Image_6 Fluorite Theme: Purple/Pink crystal gradient glow */
        .icon-fluorite-asset {
            background: linear-gradient(135deg, #da44ff 0%, #892cdc 100%);
            color: #fff;
            border: 1.5px solid #ff7bf2 !important;
            text-shadow: 0 2px 4px rgba(0,0,0,0.4);
            box-shadow: 0 0 10px rgba(218, 68, 255, 0.6) !important;
        }
        
        /* Image_7 Migul Theme: Futuristic dark ring space system */
        .icon-migul-asset {
            background: #f8fafc;
            color: #0f172a;
            border: 1.5px solid #94a3b8 !important;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.2) !important;
        }

        .icon-iosviet { color: var(--gold-amber); text-shadow: 0 0 8px var(--gold-amber); }
        .icon-sudo { color: #e2e8f0; text-shadow: 0 0 8px rgba(255,255,255,0.2); }
        .icon-ngotran { color: var(--gold-amber); text-shadow: 0 0 10px var(--gold-amber); }
        .icon-drip { color: #ff4d4d; text-shadow: 0 0 10px #ff4d4d; }
        .icon-zygame { color: var(--neon-green); text-shadow: 0 0 10px var(--neon-green); }
        .icon-aim { color: #ff3333; text-shadow: 0 0 12px #ff3333; }

        .p-name {
            font-weight: 800;
            font-size: 14px;
            margin-bottom: 2px;
        }

        .p-desc {
            font-size: 11px;
            color: var(--gray-text);
        }

        .product-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .select-duration {
            background-color: var(--bg-input);
            color: white;
            border: 1px solid #361563;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: bold;
            outline: none;
        }

        .btn-buy-now {
            background: linear-gradient(135deg, var(--cyan-blue) 0%, #ba005d 100%);
            color: #fff;
            border: none;
            padding: 7px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(255, 42, 133, 0.3);
        }

        /* REVIEWS */
        .reviews-box {
            margin-top: 25px;
            background: var(--bg-card);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid #31135c;
        }

        .review-title-text {
            font-size: 13px;
            font-weight: 800;
            color: var(--neon-green);
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        .review-item {
            border-bottom: 1px solid #31135c;
            padding: 12px 0;
        }

        .review-item:last-child {
            border: none;
        }

        .review-user {
            font-size: 12px;
            font-weight: bold;
            color: var(--cyan-blue);
            display: flex;
            justify-content: space-between;
        }

        .review-stars {
            color: var(--gold-amber);
        }

        .review-msg {
            font-size: 12px;
            color: #cbd5e1;
            margin-top: 5px;
        }

        /* PREMIUM CYBERPUNK DEPOSIT CARD DESIGN GLOW-UP */
        .topup-card {
            background: linear-gradient(145deg, #16072b 0%, #220a3d 100%);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid #43177a;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        .quick-amount-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 12px;
            margin-bottom: 5px;
        }

        .btn-quick-amount {
            background: #1f0b3b;
            border: 1px solid #43177a;
            color: #fff;
            padding: 10px 5px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .btn-quick-amount:hover, .btn-quick-amount.active-amt {
            border-color: var(--cyan-blue);
            background: rgba(255, 42, 133, 0.15);
            color: var(--cyan-blue);
            box-shadow: 0 0 10px rgba(255, 42, 133, 0.3);
        }

        .banking-detail-row {
            background: #0d041a;
            border: 1px solid #3b146d;
            border-radius: 10px;
            padding: 12px;
            margin-top: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
        }

        .copy-badge-btn {
            background: rgba(0, 255, 170, 0.1);
            color: var(--neon-green);
            border: 1px solid rgba(0, 255, 170, 0.3);
            padding: 3px 8px;
            border-radius: 5px;
            font-size: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        .copy-badge-btn:active {
            background: var(--neon-green);
            color: #000;
        }

        .qr-section-neon {
            text-align: center;
            margin: 20px 0;
            padding: 20px;
            background: linear-gradient(180deg, #1e0938 0%, #0e041c 100%);
            border-radius: 16px;
            border: 2px solid var(--cyan-blue);
            box-shadow: 0 0 20px rgba(255, 42, 133, 0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .qr-wrapper-premium {
            background: #ffffff;
            padding: 12px;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(255,255,255,0.1);
            margin: 15px 0;
        }

        .qr-image {
            width: 200px;
            height: 200px;
            display: block;
        }

        .deposit-alert-error {
            color: var(--danger-red);
            font-size: 11px;
            font-weight: bold;
            margin-top: 5px;
            display: none;
        }

        .form-label {
            display: block;
            font-size: 12px;
            color: var(--gray-text);
            margin-bottom: 6px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-submit-topup {
            width: 100%;
            background: linear-gradient(90deg, var(--neon-green) 0%, #00ffcc 100%);
            color: #000;
            border: none;
            padding: 13px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 4px 12px rgba(0, 255, 170, 0.25);
        }

        /* LEADERBOARD */
        .leaderboard-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--bg-card);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #31135c;
        }

        .leaderboard-table th, .leaderboard-table td {
            padding: 14px;
            text-align: left;
            font-size: 13px;
        }

        .leaderboard-table th {
            background-color: #120524;
            color: var(--cyan-blue);
            font-weight: 800;
        }

        .leaderboard-table tr {
            border-bottom: 1px solid #31135c;
        }

        .rank-badge {
            display: inline-block;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            text-align: center;
            line-height: 24px;
            font-weight: bold;
            font-size: 11px;
        }

        .rank-1 { background: linear-gradient(135deg, #ffe066, #ffb703); color: #000; }
        .rank-2 { background: linear-gradient(135deg, #e2e8f0, #94a3b8); color: #000; }
        .rank-3 { background: linear-gradient(135deg, #ffedd5, #bcaaa4); color: #000; }

        /* PROFILE & EXPANDABLE/CLICKABLE HISTORY LOGS */
        .profile-card {
            background: var(--bg-card);
            padding: 18px;
            border-radius: 12px;
            margin-bottom: 15px;
            border: 1px solid #31135c;
        }

        .history-box {
            margin-top: 12px;
        }

        .history-item {
            background: rgba(255,255,255,0.01);
            border: 1px solid #31135c;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 10px;
            font-size: 13px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: background 0.2s;
        }

        .history-item:hover {
            background: rgba(255, 42, 133, 0.05);
            border-color: rgba(255, 42, 133, 0.2);
        }

        .history-left {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .history-date {
            font-size: 10px;
            color: var(--gray-text);
        }

        .history-right-action {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
        }

        .click-view-hint {
            font-size: 9px;
            color: var(--cyan-blue);
            background: rgba(255, 42, 133, 0.1);
            padding: 1px 4px;
            border-radius: 3px;
        }

        .key-list-item {
            background-color: var(--bg-input);
            padding: 12px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 13px;
            color: var(--neon-green);
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #361563;
        }

        /* PREMIUM SUCCESS MODAL MATCHING IMAGE_4.PNG EXACTLY */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(3px);
        }

        .modal-box {
            background: #110620;
            padding: 24px 20px;
            border-radius: 16px;
            border: 2px solid var(--cyan-blue);
            width: 88%;
            max-width: 350px;
            text-align: center;
            box-shadow: 0 0 25px rgba(255, 42, 133, 0.4);
            box-sizing: border-box;
        }

        .modal-box h3 {
            margin-top: 0;
            color: var(--neon-green);
            font-size: 20px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .modal-box p {
            font-size: 13px;
            color: #cbd5e1;
            line-height: 1.5;
            margin-bottom: 15px;
        }

        .generated-key-container {
            background-color: #05010a;
            color: var(--neon-green);
            font-family: monospace;
            font-size: 16px;
            font-weight: bold;
            padding: 14px;
            border-radius: 10px;
            margin: 18px 0;
            letter-spacing: 1px;
            border: 2px dashed var(--neon-green);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-modal-close-premium {
            width: 100%;
            background-color: var(--cyan-blue);
            color: #fff;
            border: none;
            padding: 13px;
            border-radius: 10px;
            font-weight: 800;
            font-size: 14px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(255, 42, 133, 0.3);
        }

        /* BOTTOM NAVBAR TABS */
        .bottom-navbar {
            position: fixed;
            bottom: 0; left: 0; width: 100%; height: 68px;
            background: linear-gradient(360deg, #0a0413 0%, #1a0830 100%);
            border-top: 1px solid #31135c;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 999;
        }

        .nav-tab {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            color: #8c72a6;
            font-size: 10px;
            font-weight: 800;
            cursor: pointer;
            flex: 1;
        }

        .nav-tab i { font-size: 18px; }
        .nav-tab.active { color: var(--cyan-blue); text-shadow: 0 0 8px var(--cyan-blue); }

        /* LIVE DEPOSIT NOTIFICATION FLOATING TICKER TOOLKIT */
        .fomo-ticker-hub {
            position: fixed;
            bottom: 82px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 30px);
            max-width: 360px;
            background: linear-gradient(90deg, #1f073a 0%, #110422 100%);
            border: 1px solid var(--cyan-blue);
            box-shadow: 0 0 15px rgba(255, 42, 133, 0.35);
            border-radius: 30px;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            color: #fff;
            z-index: 998;
            pointer-events: none;
            opacity: 0;
            transform: translate(-50%, 20px);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .fomo-ticker-hub.visible {
            opacity: 1;
            transform: translate(-50%, 0);
        }
        .fomo-pulse-dot {
            width: 8px;
            height: 8px;
            background-color: var(--neon-green);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--neon-green);
        }
    </script>
</head>
<body>

    <div class="header">
        <div class="user-block">
            <div id="user-avatar" class="avatar-box">HB</div>
            <div class="user-meta">
                <div id="user-name" class="user-name">Loading...</div>
                <div id="account-id-display" class="user-account-id">ID: 8692475970</div>
                <div id="user-balance" class="balance-badge">0đ</div>
            </div>
        </div>
        <div class="top-controls">
            <button id="lang-btn" class="lang-switch-btn" onclick="toggleLanguage()">🌐 EN</button>
            <button class="admin-glow-btn" onclick="openAdmin()">ADMIN PANEL</button>
        </div>
    </div>

    <div id="admin-panel" class="admin-container">
        <p class="admin-title">⚙️ Panel Quản Trị Tối Cao</p>
        
        <label class="form-label" style="color:var(--neon-green)">Nhập ID tài khoản khách để cộng tiền:</label>
        <input type="text" id="cfg-target-id" class="input-field" placeholder="Ví dụ: 8692475970">
        
        <label class="form-label" style="color:var(--neon-green)">Số tiền muốn cộng (đ):</label>
        <input type="number" id="cfg-add-money" class="input-field" placeholder="Ví dụ: 500000">
        <button class="btn-update-config" onclick="processAdminDeposit()" style="margin-bottom:15px;">Cộng Tiền Tài Khoản</button>
        
        <hr style="border:0; border-top:1px solid #31135c; margin-bottom:12px;">
        <label class="form-label">Cấu hình thông báo Shop:</label>
        <input type="text" id="cfg-title" class="input-field" placeholder="Tiêu đề thông báo">
        <input type="text" id="cfg-desc" class="input-field" placeholder="Nội dung chi tiết">
        <button class="btn-update-config" onclick="saveAdminConfig()">Cập Nhật Thông Báo</button>
    </div>

    <div id="tab-store" class="tab-content active">
        <div style="background: var(--bg-card); padding: 14px; border-radius: 10px; margin-bottom: 15px; border-left: 4px solid var(--cyan-blue);">
            <div id="ann-title" style="font-weight:bold; font-size:13px; color:var(--cyan-blue);">Huy Bảo Shop - Free Fire</div>
            <div id="ann-desc" style="font-size:12px; color:#cbd5e1; margin-top:4px;">Uy tín - Chất lượng - Hỗ trợ nhiệt tình.</div>
        </div>

        <div class="cate-title"><i class="fa-brands fa-apple"></i> <span data-key="cate_ios">Mục iOS (iPhone, iPad)</span></div>
        <div class="product-group">
            
            <div class="product-item">
                <div class="product-left">
                    <div class="product-icon-wrapper icon-migul-asset">
                        <i class="fa-solid fa-circle-radiation" style="color:#0f172a"></i>
                    </div>
                    <div>
                        <div class="p-name">MIGUL PRO</div>
                        <div class="p-desc" data-key="desc_esign">Kèm chứng chỉ ESIGN 1 năm</div>
                    </div>
                </div>
                <div class="product-right">
                    <select class="select-duration" id="price-migul-pro">
                        <option value="450000">Tháng: 450K</option>
                        <option value="215000">Tuần: 215K</option>
                        <option value="80000">Ngày: 80K</option>
                    </select>
                    <button class="btn-buy-now" onclick="triggerDualPurchaseFlow('MIGUL PRO', 'price-migul-pro')" data-key="btn_buy">Mua</button>
                </div>
            </div>

        function syncTelegram() {
            const tg = window.Telegram.WebApp;
            tg.expand();

        /* DỊCH SỐ TIỀN THÀNH CHỮ CHỐNG LỖI BÀN PHÍM */
        function convertNumberToWords(number) {
            if (number === 0) return "Không đồng.";
            if (number === 20000) return "Hai mươi nghìn đồng.";
            if (number === 50000) return "Năm mươi nghìn đồng.";
            if (number === 100000) return "Một trăm nghìn đồng.";
            if (number === 200000) return "Hai trăm nghìn đồng.";
            if (number === 500000) return "Năm trăm nghìn đồng.";
            if (number === 1000000) return "Một triệu đồng.";
            return number.toLocaleString('vi-VN') + " đồng.";
        }

        /* HÀM XỬ LÝ KHI KHÁCH TỰ NHẬP TIỀN */
        function handleAmountTyping() {
            const inputEl = document.getElementById('topup-amount-input');
            const wordsEl = document.getElementById('topup-amount-words');
            
            // Xóa toàn bộ ký tự không phải số
            let rawValue = inputEl.value.replace(/\D/g, '');
            
            if (!rawValue) {
                wordsEl.innerText = "Bằng chữ: Không đồng.";
                validateAndGenerateQR();
                return;
            }

            let numericValue = parseInt(rawValue);
            // Định dạng hiển thị phân tách dấu chấm trực quan thời gian thực
            inputEl.value = numericValue.toLocaleString('vi-VN');
            
            // Cập nhật dịch văn bản tương ứng
            wordsEl.innerText = "Bằng chữ: " + convertNumberToWords(numericValue);
            
            validateAndGenerateQR();
        }

        /* QUICK SELECT DEPOSIT SCRIPT */
        function selectQuickAmount(amount, element) {
            document.querySelectorAll('.btn-quick-amount').forEach(btn => btn.classList.remove('active-amt'));
            element.classList.add('active-amt');
            
            const inputEl = document.getElementById('topup-amount-input');
            inputEl.value = amount.toLocaleString('vi-VN');
            
            document.getElementById('topup-amount-words').innerText = "Bằng chữ: " + convertNumberToWords(amount);
            validateAndGenerateQR();
        }

        function validateAndGenerateQR() {
            const amountInput = document.getElementById('topup-amount-input');
            const errorMsg = document.getElementById('topup-error-msg');
            const qrImg = document.getElementById('vietqr-dynamic-image');
            
            let amount = parseInt(amountInput.value.replace(/\D/g, ''));
            if (isNaN(amount)) amount = 0;

            if (amount < 20000) {
                errorMsg.style.display = 'block';
                qrImg.style.opacity = '0.2';
                return;
            }

            errorMsg.style.display = 'none';
            qrImg.style.opacity = '1';
            qrImg.src = `https://img.vietqr.io/image/MB-2660566922-compact2.jpg?amount=${amount}&addInfo=HuyBaoShop%20ID%20${globalUserId}`;
        }

        function copyToClipboard(text, alertMsg) {
            navigator.clipboard.writeText(text).then(() => {
                alert(alertMsg);
            }).catch(() => {
                alert("Không thể tự động sao chép, vui lòng copy thủ công!");
            });
        }

        function toggleLanguage() {
            currentLang = currentLang === 'vi' ? 'en' : 'vi';
            document.getElementById('lang-btn').textContent = currentLang === 'vi' ? '🌐 EN' : '🌐 VI';
            document.querySelectorAll('[data-key]').forEach(el => {
                const key = el.getAttribute('data-key');
                if (dictionary[currentLang][key]) el.textContent = dictionary[currentLang][key];
            });
        }

        function switchTab(tabElement, tabId) {
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
            tabElement.classList.add('active');
            document.getElementById(tabId).style.display = 'block';
        }

        function openAdmin() {
            const panel = document.getElementById('admin-panel');
            if (panel.style.display === 'block') { panel.style.display = 'none'; return; }
            const pass = prompt("Nhập mã xác thực Admin tối cao:");
            if (pass === ADMIN_PASS) panel.style.display = 'block';
        }

        function processAdminDeposit() {
            const targetId = document.getElementById('cfg-target-id').value.trim();
            const amt = parseInt(document.getElementById('cfg-add-money').value);

            if(!targetId || isNaN(amt) || amt <= 0) {
                alert("Vui lòng nhập đầy đủ thông tin!");
                return;
            }

            if(targetId === globalUserId) {
                userBalance += amt;
                localStorage.setItem('user_balance', userBalance.toString());
                updateBalanceUI();
                alert(`Đã cộng tiền thành công cho tài khoản ID: ${targetId}`);
            } else {
                alert(`Đã gửi yêu cầu cộng tiền cho ID: ${targetId} lên server chính.`);
            }
            document.getElementById('cfg-add-money').value = '';
        }

        function saveAdminConfig() {
            const t = document.getElementById('cfg-title').value;
            const d = document.getElementById('cfg-desc').value;
            if(t) document.getElementById('ann-title').textContent = t;
            if(d) document.getElementById('ann-desc').textContent = d;
            alert("Đã lưu thông báo mới!");
            document.getElementById('admin-panel').style.display = 'none';
        }

        function triggerDualPurchaseFlow(baseName, selectId) {
            const selectEl = document.getElementById(selectId);
            const chosenValue = parseInt(selectEl.value);
            const durationText = selectEl.options[selectEl.selectedIndex].text;
            triggerPurchaseFlow(`${baseName} (${durationText})`, chosenValue);
        }

        function triggerPurchaseFlow(productName, price) {
            const confirmMsg = `[XÁC THỰC THANH TOÁN]\n\nSản phẩm: ${productName}\nGiá bán: ${price.toLocaleString('vi-VN')}đ\nSố dư ví: ${userBalance.toLocaleString('vi-VN')}đ\n\nBạn xác nhận thanh toán mua gói này?`;
            if (!confirm(confirmMsg)) return;

            if (userBalance < price) {
                alert(`❌ Thất bại! Số dư ví không đủ. Bạn cần nạp thêm ít nhất ${(price - userBalance).toLocaleString('vi-VN')}đ nữa.`);
                return;
            }

            userBalance -= price;
            localStorage.setItem('user_balance', userBalance.toString());
            updateBalanceUI();

            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let generatedKey = '';
            for (let i = 0; i < 16; i++) generatedKey += chars.charAt(Math.floor(Math.random() * chars.length));

            openKeyModal(generatedKey, "🎉 Mua Thành Công!", "Sao chép mã Key bản quyền Free Fire độc quyền của sếp bên dưới:");
            saveAndLogTransaction(productName, generatedKey, price);
        }

        function openKeyModal(key, titleText, descText) {
            document.getElementById('modal-status-title').textContent = titleText;
            document.getElementById('modal-status-desc').textContent = descText;
            document.getElementById('key-display').textContent = key;
            document.getElementById('key-modal').style.display = 'flex';
        }

        function closeKeyModal() { document.getElementById('key-modal').style.display = 'none'; }

        function saveAndLogTransaction(name, key, price) {
            const now = new Date();
            const timestamp = `${now.getDate()}/${now.getMonth()+1} ${now.getHours()}:${now.getMinutes()}`;

            const container = document.getElementById('purchased-keys-box');
            const noKeyText = document.getElementById('no-key-text');
            if (noKeyText) noKeyText.remove();

            const div = document.createElement('div');
            div.className = 'key-list-item';
            div.innerHTML = `<span><strong>${name}</strong>: ${key}</span> <i class="fa-regular fa-copy" onclick="copyToClipboard('${key}', 'Đã copy mã Key!')"></i>`;
            container.insertBefore(div, container.firstChild);
            
            let historyLog = JSON.parse(localStorage.getItem('shop_history_logs')) || [];
            historyLog.unshift({ name, key, price, time: timestamp });
            localStorage.setItem('shop_history_logs', JSON.stringify(historyLog));
            renderHistoryUI();
        }

        function renderHistoryUI() {
            const logBox = document.getElementById('history-log-box');
            let historyLog = JSON.parse(localStorage.getItem('shop_history_logs')) || [];
            
            if(historyLog.length === 0) {
                logBox.innerHTML = `<div style="font-size:12px; color:var(--gray-text); text-align:center; padding:10px;">Chưa có lịch sử giao dịch nào.</div>`;
                return;
            }

            logBox.innerHTML = '';
            historyLog.forEach(log => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.onclick = function() {
                    openKeyModal(log.key, "🔑 Chi Tiết Bản Quyền", `Sản phẩm: ${log.name}\nThời gian: ${log.time}`);
                };
                
                div.innerHTML = `
                    <div class="history-left">
                        <span style="font-weight:bold; color:#fff;">${log.name}</span>
                        <span class="history-date">${log.time}</span>
                    </div>
                    <div class="history-right-action">
                        <span style="color:var(--gold-amber); font-weight:bold;">-${log.price.toLocaleString('vi-VN')}đ</span>
                        <span class="click-view-hint">Xem Key <i class="fa-solid fa-key" style="font-size:9px"></i></span>
                    </div>
                `;
                logBox.appendChild(div);
            });
        }

        function processAccountTopup() {
            const u = document.getElementById('topup-user').value;
            const p = document.getElementById('topup-pass').value;
            if (!u || !p) { alert("Vui lòng điền đủ thông tin đăng nhập!"); return; }
            alert("Gửi yêu cầu đồng bộ tài khoản thành công! Gói nạp sẽ được kích hoạt sau 3-5 phút.");
            document.getElementById('topup-user').value = '';
            document.getElementById('topup-pass').value = '';
        }

        /* --- LOGIC CHẠY THÔNG BÁO NẠP TIỀN LÊN CHẬM (AUTO DELAY 15-45S) --- */
        const fomoUsers = ["hoangphong_ff***", "thanhdieu_cheat***", "vutrong_pro***", "quangdat_game***", "minhquan.vip***", "tuananh.ff***", "duykhánh_gamer***"];
        const fomoAmounts = ["20.000đ", "50.000đ", "100.000đ", "200.000đ", "500.000đ", "1.000.000đ"];
        
        function runFomoTickerLoop() {
            const tickerEl = document.getElementById('fomo-ticker');
            const msgEl = document.getElementById('fomo-ticker-msg');
            
            let randomUser = fomoUsers[Math.floor(Math.random() * fomoUsers.length)];
            let randomAmount = fomoAmounts[Math.floor(Math.random() * fomoAmounts.length)];
            
            msgEl.innerHTML = `Đại gia <b>${randomUser}</b> vừa nạp thành công <b>${randomAmount}</b> hệ thống duyệt tự động.`;
            
            // Show ticker
            tickerEl.classList.add('visible');
            
            // Hide ticker after 4 seconds
            setTimeout(() => {
                tickerEl.classList.remove('visible');
                
                // Thiết lập chu kỳ loop ngẫu nhiên từ 15 giây đến 45 giây kế tiếp
                let nextIntervalDelay = Math.floor(Math.random() * (45000 - 15000 + 1)) + 15000;
                setTimeout(runFomoTickerLoop, nextIntervalDelay);
            }, 4000);
        }

        window.onload = function() {
            initWallet();
            syncTelegram();
            renderHistoryUI();
            
            // Chạy phát đầu tiên sau khi load app 8 giây
            setTimeout(runFomoTickerLoop, 8000);
        };
    </script>
</body>
</html>
